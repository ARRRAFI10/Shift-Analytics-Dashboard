# Shift Analytics Dashboard — full stack in two containers.
#
#   docker compose up --build
#
# Then open http://localhost:8080 for the dashboard.
# The API is also reachable directly at http://localhost:8000/api for curl/testing.

services:
  backend:
    build: ./backend
    container_name: shift-backend
    environment:
      # DEBUG off; the API only serves JSON so no static-file serving is needed.
      DEBUG: "False"
      SECRET_KEY: "docker-dev-change-me"
      # Host header arrives via the nginx proxy; allow the relevant hosts.
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,0.0.0.0"
      # Harmless with the same-origin proxy, but kept for direct browser access.
      CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Relative path -> the SPA calls the API through nginx (same origin).
        VITE_API_URL: /api
    container_name: shift-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
