server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: serve index.html for any client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container over the compose network.
    # Keeps everything same-origin, so no CORS is involved.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow .xlsx uploads through the proxy.
        client_max_body_size 25m;
    }
}
